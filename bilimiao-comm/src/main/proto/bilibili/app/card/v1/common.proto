// 条目基本信息
message Base {
    // 卡片类型
    string card_type = 1;
    // 卡片跳转类型?
    string card_goto = 2;
    // 跳转类型
    // av:视频稿件 mid:用户空间
    string goto = 3;
    // 目标参数
    string param = 4;
    // 封面url
    string cover = 5;
    // 标题
    string title = 6;
    // 跳转uri
    string uri = 7;
    //
    ThreePoint three_point = 8;
    //
    Args args = 9;
    //
    PlayerArgs player_args = 10;
    // 条目排位序号
    int64 idx = 11;
    //
    // TODO: ad_info = 12 在新版API已启用（含 is_ad, cm_mark 等字段）
    // 当前 REST API 未返回此字段，等升级后再取消注释
//    AdInfo ad_info = 12;
    //
    Mask mask = 13;
    //来源标识
    // recommend:推荐 operation:管理?
    string from_type = 14;
    //
    repeated ThreePointV2 three_point_v2 = 15;
    //
    repeated ThreePointV3 three_point_v3 = 16;
    //
    Button desc_button = 17;
    // 三点v4
    ThreePointV4 three_point_v4 = 18;
    //
    UpArgs up_args = 19;
}

// 按钮信息
message Button {
    // 文案
    string text = 1;
    // 参数
    string param = 2;
    //
    string uri = 3;
    // 事件
    string event = 4;
    //
    int32 selected = 5;
    // 类型
    int32 type = 6;
    // 事件v2
    string event_v2 = 7;
    // 关系信息
    Relation relation = 8;
}

//
message DislikeReason {
    //
    int64 id = 1;
    //
    string name = 2;
}

//
message LikeButton {
    //
    int64 Aid = 1;
    //
    int32 count = 2;
    //
    bool show_count = 3;
    //
    string event = 4;
    //
    int32 selected = 5;
    //
    string event_v2 = 6;
}

//
message Mask {
    //
    Avatar avatar = 1;
    //
    Button button = 2;
}

//
message PlayerArgs {
    //
    int32 is_live = 1;
    //
    int64 aid = 2;
    //
    int64 cid = 3;
    //
    int32 sub_type = 4;
    //
    int64 room_id = 5;
    //
    int64 ep_id = 7;
    //
    int32 is_preview = 8;
    //
    string type = 9;
    //
    int64 duration = 10;
    //
    int64 season_id = 11;
}

// 标签框信息
message ReasonStyle {
    // 文案
    string text = 1;
    // 文字颜色
    string text_color = 2;
    // 背景色
    string bg_color = 3;
    // 边框色
    string border_color = 4;
    // 图标url
    string icon_url = 5;
    // 文字颜色-夜间
    string text_color_night = 6;
    // 背景色-夜间
    string bg_color_night = 7;
    // 边框色-夜间
    string border_color_night = 8;
    // 图标url-夜间
    string icon_night_url = 9;
    // 背景风格id
    // 1:无背景 2:有背景
    int32 bg_style = 10;
    //
    string uri = 11;
    //
    string icon_bg_url = 12;
    //
    string event = 13;
    //
    string event_v2 = 14;
    //
    int32 right_icon_type = 15;
    //
    string left_icon_type = 16;
}

// 关系信息
message Relation {
    // 关系状态
    int32 status = 1;
    // 是否关注
    int32 is_follow = 2;
    // 是否粉丝
    int32 is_followed = 3;
}

// 分享面板信息
message SharePlane {
    // 标题
    string title = 1;
    // 副标贴文案
    string share_subtitle = 2;
    // 备注
    string desc = 3;
    // 封面url
    string cover = 4;
    // 稿件avid
    int64 aid = 5;
    // 稿件bvid
    string bvid = 6;
    // 允许分享方式
    map<string,bool> share_to = 7;
    // UP主昵称
    string author = 8;
    // UP主mid
    int64 author_id = 9;
    // 短连接
    string short_link = 10;
    // 播放次数文案
    string play_number = 11;
    //
    int64 first_cid = 12;
}

//
message ThreePoint {
    //
    repeated DislikeReason dislike_reasons = 1;
    //
    repeated DislikeReason feedbacks = 2;
    //稍后再看
    int32 watch_later = 3;
}

//
message ThreePointV2 {
    //
    string title = 1;
    //
    string subtitle = 2;
    //
    repeated DislikeReason reasons = 3;
    //
    string type = 4;
    //
    int64 id = 5;
}

//
message ThreePointV3 {
    //
    string title = 1;
    //
    string selected_title = 2;
    //
    string subtitle = 3;
    //
    repeated DislikeReason reasons = 4;
    //
    string type = 5;
    //
    int64 id = 6;
    //
    int32 selected = 7;
    //
    string icon = 8;
    //
    string selected_icon = 9;
    //
    string url = 10;
    //
    int32 default_id = 11;
}

// 三点v4
message ThreePointV4 {
    // 分享面板信息
    SharePlane share_plane = 1;
    // 稍后再看
    WatchLater watch_later = 2;
}

//
message Up {
    //
    int64 id = 1;
    //
    string name = 2;
    //
    string desc = 3;
    //
    Avatar avatar = 4;
    //
    int32 official_icon = 5;
    //
    Button desc_button = 6;
    //
    string cooperation = 7;
}

//
message UpArgs {
    //
    int64 up_id = 1;
    //
    string up_name = 2;
    //
    string up_face = 3;
    //
    int64 selected = 4;
}

// 稍后再看信息
message WatchLater {
    // 稿件avid
    int64 aid = 1;
    // 稿件bvid
    string bvid = 2;
}
