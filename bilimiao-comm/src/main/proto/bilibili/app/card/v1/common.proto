syntax = "proto3";

package bilibili.app.card.v1;

//
message Args {
    //
    int32 type = 1;
    //
    int64 up_id = 2;
    //
    string up_name = 3;
    //
    int32 rid = 4;
    //
    string rname = 5;
    //
    int64 tid = 6;
    //
    string tname = 7;
    //
    string track_id = 8;
    //
    string state = 9;
    //
    int32 converge_type = 10;
    //
    int64 aid = 11;
}

//
message Avatar {
    //
    string cover = 1;
    //
    string text = 2;
    //
    string uri = 3;
    //
    int32 type = 4;
    //
    string event = 5;
    //
    string event_v2 = 6;
    //
    int32 defalut_cover = 7;
}

